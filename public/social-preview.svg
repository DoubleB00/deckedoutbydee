<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <rect width="1200" height="630" fill="#FFF5F7"/>
  <rect width="1200" height="630" fill="url(#gradient)"/>

  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF5F7"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFF9F5"/>
    </linearGradient>
  </defs>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="#FFC0CB" opacity="0.1"/>
  <circle cx="1100" cy="530" r="100" fill="#FFD700" opacity="0.1"/>
  <circle cx="950" cy="150" r="60" fill="#FFC0CB" opacity="0.15"/>

  <!-- Heart icon -->
  <g transform="translate(150, 180)">
    <path d="M50 25 C50 15, 35 5, 25 5 C15 5, 5 15, 5 25 C5 40, 25 60, 50 75 C75 60, 95 40, 95 25 C95 15, 85 5, 75 5 C65 5, 50 15, 50 25 Z" fill="#EC4899"/>
  </g>

  <!-- Main heading -->
  <text x="150" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="#1F2937">
    Decked Out by Dee
  </text>

  <!-- Subheading -->
  <text x="150" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#6B7280">
    Custom Creations for Every Occasion
  </text>

  <!-- Feature badges -->
  <g transform="translate(150, 440)">
    <!-- Badge 1 -->
    <rect x="0" y="0" width="200" height="50" rx="25" fill="#FFC0CB" opacity="0.2"/>
    <text x="100" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#EC4899" text-anchor="middle">Stadium Bags</text>

    <!-- Badge 2 -->
    <rect x="220" y="0" width="180" height="50" rx="25" fill="#FFD700" opacity="0.2"/>
    <text x="310" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#D97706" text-anchor="middle">Custom Gifts</text>

    <!-- Badge 3 -->
    <rect x="420" y="0" width="200" height="50" rx="25" fill="#FFC0CB" opacity="0.2"/>
    <text x="520" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#EC4899" text-anchor="middle">Event Decor</text>
  </g>

  <!-- Decorative icons on right side -->
  <g transform="translate(850, 200)">
    <!-- Gift box icon -->
    <rect x="0" y="30" width="80" height="80" rx="8" fill="#FFC0CB" opacity="0.3"/>
    <rect x="35" y="0" width="10" height="110" fill="#EC4899" opacity="0.4"/>
    <rect x="0" y="50" width="80" height="10" fill="#EC4899" opacity="0.4"/>
    <path d="M40 0 Q30 10, 40 20 Q50 10, 40 0 Z" fill="#EC4899" opacity="0.5"/>
  </g>

  <g transform="translate(950, 320)">
    <!-- Shopping bag icon -->
    <path d="M10 20 L70 20 L65 100 L15 100 Z" fill="#FFD700" opacity="0.3"/>
    <path d="M25 20 L25 15 Q25 5, 40 5 Q55 5, 55 15 L55 20" stroke="#D97706" stroke-width="3" fill="none" opacity="0.5"/>
  </g>
</svg>
